name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg-cache
  VCPKG_ROOT: C:\vcpkg

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        target: [SE_AE]
        include:
          - target: SE_AE
            preset: vs2022-windows-vcpkg-release
            build_dir: build
            artifact: ConsiderateFollowers-SE-AE

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup vcpkg
      run: |
        mkdir -p ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
        cd $env:VCPKG_INSTALLATION_ROOT
        ./bootstrap-vcpkg.bat
        ./vcpkg --version > ${{ github.workspace }}/vcpkg-version.txt

    - name: Cache vcpkg
      uses: actions/cache@v4
      id: vcpkg-cache
      env:
        cache-name: vcpkg-cache
      with:
        path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}/*
        key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ matrix.target }}-${{ hashFiles('main/**/vcpkg.json', 'vcpkg-version.txt') }}

    - name: Configure CMake
      run: |
        cmake --preset ${{ matrix.preset }} -Wno-deprecated

    - name: Build
      run: |
        cmake --build ${{ github.workspace }}/${{ matrix.build_dir }} --config ${{ env.BUILD_TYPE }}

    - name: Install
      run: |
        cmake --install ${{ github.workspace }}/${{ matrix.build_dir }} --component "components" --config ${{ env.BUILD_TYPE }} --prefix ${{ github.workspace }}/ReleaseBuild
        cmake --install ${{ github.workspace }}/${{ matrix.build_dir }} --component "SKSEPlugin" --config ${{ env.BUILD_TYPE }} --prefix ${{ github.workspace }}/ReleaseBuild

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact }}
        path: ${{ github.workspace }}/ReleaseBuild
